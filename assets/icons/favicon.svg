<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Fondo crema, igual que el logo real -->
  <rect width="32" height="32" rx="6" fill="#F4F1EC"/>
  <!--
    Isotipo Recebo: el símbolo de bombilla / "R" estilizado
    Fiel al logo adjuntado: trazo negro fino sobre fondo claro.
    Forma: línea horizontal a la izquierda + curva ascendente a la derecha arriba
